name: CI
on:
  pull_request: { branches: [main] }
  push: { branches: [main] }

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt pre-commit ruff pytest
      - run: python -m py_compile generate.py gui.py core.py
      - run: python -m py_compile eyegen/**/*.py
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest
