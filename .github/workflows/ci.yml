name: CI
on:
  pull_request: { branches: [main] }
  push: { branches: [main] }

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt pre-commit ruff pytest
      - run: pip install -e .
      - run: |
          for f in generate.py gui.py core.py; do
            if [ -f "$f" ]; then
              python -m py_compile "$f"
            else
              echo "Skipping missing file $f"
            fi
          done
      - run: find eyegen -name '*.py' -print0 | xargs -0 python -m py_compile
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest

# >>> esper-stack:python (ci) — add under `jobs:` in .github/workflows/ci.yml
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev && uv run pytest --cov --cov-fail-under=0
