# Ruff — Python lint + format, encoding the tool-enforceable commandments.
# NOTE: ruff has no native max-lines-per-file rule, so Commandment II's
# file-length gate lives in the `max-file-lines` pre-commit hook. Function
# length is approximated here via statement count + complexity.

line-length = 100
target-version = "py312"

[lint]
select = [
  "E", "W",      # pycodestyle (E722 = bare except → Commandment VI)
  "F",           # pyflakes — unused imports/vars (VII)
  "I",           # isort — import order
  "B",           # bugbear — incl. B904 raise-from (meaningful errors, VI)
  "T20",         # no print / pprint (logging commandment)
  "S",           # bandit — S608 SQL injection, S602/S603 shell (X); secrets (XVIII)
  "PLR0915",     # too-many-statements — function-length proxy (II)
  "C90",         # mccabe complexity
  "DTZ",         # naive datetimes — time is UTC/zoned (XX)
  "ASYNC",       # flake8-async (concurrency, IX)
]

[lint.mccabe]
max-complexity = 10

[lint.pylint]
max-statements = 40            # Commandment II — function length (statement proxy)

[lint.per-file-ignores]
"tests/**" = ["S101"]          # asserts allowed in tests
"generate.py" = ["B008", "PLR0915", "C901", "E501", "B904"]
"gui.py" = ["PLR0915", "C901", "E501"]
"core.py" = ["PLR0915", "C901", "E501"]
